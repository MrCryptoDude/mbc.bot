<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Tree Defence</title>
		<style>
html, body, #canvas {
	margin: 0;
	padding: 0;
	border: 0;
}

body {
	color: white;
	background-color: black;
	overflow: hidden;
	touch-action: none;
}

#canvas {
	display: block;
}

#canvas:focus {
	outline: none;
}

#status, #status-splash, #status-progress {
	position: absolute;
	left: 0;
	right: 0;
}

#status, #status-splash {
	top: 0;
	bottom: 0;
}

#status {
	background-color: #242424;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	visibility: hidden;
}

#status-splash {
	max-height: 100%;
	max-width: 100%;
	margin: auto;
}

#status-splash.show-image--false {
	display: none;
}

#status-splash.fullsize--true {
	height: 100%;
	width: 100%;
	object-fit: contain;
}

#status-splash.use-filter--false {
	image-rendering: pixelated;
}

#status-progress, #status-notice {
	display: none;
}

#status-progress {
	bottom: 10%;
	width: 50%;
	margin: 0 auto;
}

#status-notice {
	background-color: #5b3943;
	border-radius: 0.5rem;
	border: 1px solid #9b3943;
	color: #e0e0e0;
	font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
	line-height: 1.3;
	margin: 0 2rem;
	overflow: hidden;
	padding: 1rem;
	text-align: center;
	z-index: 1;
}

/* CLICK-TO-START OVERLAY — sits on top of everything */
#click-overlay {
	position: fixed;
	top: 0; left: 0; right: 0; bottom: 0;
	background: #0a0a14;
	display: flex; flex-direction: column;
	align-items: center; justify-content: center;
	gap: 20px; cursor: pointer; z-index: 9999;
	user-select: none;
}
#click-overlay:hover .play-btn { background: #ffd04a; transform: scale(1.05); }
.play-btn {
	font-family: Arial, sans-serif; font-size: 32px; font-weight: 700;
	color: #0a0a14; background: #e8a912;
	padding: 18px 56px; border-radius: 14px; letter-spacing: 3px;
	box-shadow: 0 4px 30px rgba(232,169,18,0.4); transition: all 0.3s;
}
.start-hint { font-size: 14px; color: #787470; letter-spacing: 1px; font-family: monospace; }
.start-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #e8a912; box-shadow: 0 0 50px rgba(232,169,18,0.3); }
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>
	<body>
		<!-- CLICK OVERLAY — removed on click, then Godot starts with audio unlocked -->
		<div id="click-overlay">
			<img src="../assets/mbc-logo.jpg" alt="MBC" class="start-logo" onerror="this.style.display='none'">
			<div class="play-btn">▶ PLAY</div>
			<div class="start-hint">Click to start (enables sound)</div>
			<div class="start-hint">Press F11 for fullscreen</div>
		</div>

		<canvas id="canvas">
			Your browser does not support the canvas tag.
		</canvas>

		<noscript>
			Your browser does not support JavaScript.
		</noscript>

		<div id="status">
			<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
			<progress id="status-progress"></progress>
			<div id="status-notice"></div>
		</div>

		<script src="index.js"></script>
		<script>
// Wait for click before starting the engine
document.getElementById('click-overlay').addEventListener('click', function() {
	// Remove overlay
	document.getElementById('click-overlay').remove();

	// NOW start Godot — this is inside a user gesture so AudioContext will be allowed
	const GODOT_CONFIG = {"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":75157396,"index.wasm":37686550},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4};
	const GODOT_THREADS_ENABLED = false;
	const engine = new Engine(GODOT_CONFIG);

	(function () {
		const statusOverlay = document.getElementById('status');
		const statusProgress = document.getElementById('status-progress');
		const statusNotice = document.getElementById('status-notice');

		let initializing = true;
		let statusMode = '';

		function setStatusMode(mode) {
			if (statusMode === mode || !initializing) {
				return;
			}
			if (mode === 'hidden') {
				statusOverlay.remove();
				initializing = false;
				return;
			}
			statusOverlay.style.visibility = 'visible';
			statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
			statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
			statusMode = mode;
		}

		function setStatusNotice(text) {
			while (statusNotice.lastChild) {
				statusNotice.removeChild(statusNotice.lastChild);
			}
			const lines = text.split('\n');
			lines.forEach((line) => {
				statusNotice.appendChild(document.createTextNode(line));
				statusNotice.appendChild(document.createElement('br'));
			});
		}

		function displayFailureNotice(err) {
			console.error(err);
			if (err instanceof Error) {
				setStatusNotice(err.message);
			} else if (typeof err === 'string') {
				setStatusNotice(err);
			} else {
				setStatusNotice('An unknown error occurred.');
			}
			setStatusMode('notice');
			initializing = false;
		}

		const missing = Engine.getMissingFeatures({
			threads: GODOT_THREADS_ENABLED,
		});

		if (missing.length !== 0) {
			if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
				let serviceWorkerRegistrationPromise;
				try {
					serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
				} catch (err) {
					serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
				}
				Promise.race([
					serviceWorkerRegistrationPromise.then((registration) => {
						if (registration != null) {
							return Promise.reject(new Error('Service worker already exists.'));
						}
						return registration;
					}).then(() => engine.installServiceWorker()),
					new Promise((resolve) => {
						setTimeout(() => resolve(), 2000);
					}),
				]).then(() => {
					window.location.reload();
				}).catch((err) => {
					console.error('Error while registering service worker:', err);
				});
			} else {
				const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
				displayFailureNotice(missingMsg + missing.join('\n'));
			}
		} else {
			setStatusMode('progress');
			engine.startGame({
				'onProgress': function (current, total) {
					if (current > 0 && total > 0) {
						statusProgress.value = current;
						statusProgress.max = total;
					} else {
						statusProgress.removeAttribute('value');
						statusProgress.removeAttribute('max');
					}
				},
			}).then(() => {
				setStatusMode('hidden');
				// Focus canvas for keyboard input
				document.getElementById('canvas').focus();
			}, displayFailureNotice);
		}
	}());
});

// Fullscreen on F11
document.addEventListener('keydown', (e) => {
	if (e.key === 'F11') {
		e.preventDefault();
		if (!document.fullscreenElement) document.documentElement.requestFullscreen();
		else document.exitFullscreen();
	}
});
		</script>
	</body>
</html>
