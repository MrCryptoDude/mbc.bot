<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
		<title>Tree Defence — MEME•BACKED•CURRENCY</title>
		<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; background: #000; }
body { display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', Arial, sans-serif; }

/* Click-to-start overlay */
#start-overlay {
	position: fixed; top: 0; left: 0; right: 0; bottom: 0;
	background: #0a0a14;
	display: flex; flex-direction: column; align-items: center; justify-content: center;
	gap: 20px; cursor: pointer; z-index: 100; user-select: none;
}
#start-overlay:hover .play-btn { background: #ffd04a; transform: scale(1.05); }
.play-btn {
	font-family: 'Segoe UI', Arial, sans-serif; font-size: 32px; font-weight: 700;
	color: #0a0a14; background: #e8a912;
	padding: 18px 56px; border-radius: 14px; letter-spacing: 3px;
	box-shadow: 0 4px 30px rgba(232,169,18,0.4); transition: all 0.3s;
}
.start-hint { font-size: 14px; color: #787470; letter-spacing: 1px; }
.start-logo { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #e8a912; box-shadow: 0 0 50px rgba(232,169,18,0.3); }

/* Canvas wrapper */
#canvas-wrapper {
	width: 100vw; height: 100vh;
	display: none; position: relative; background: #000;
}
#canvas {
	position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
	image-rendering: auto;
}
#canvas:focus { outline: none; }

/* Godot loading overlay */
#status {
	position: absolute; left: 0; right: 0; top: 0; bottom: 0;
	background-color: #1a1a2e;
	display: flex; flex-direction: column; justify-content: center; align-items: center;
	visibility: hidden; z-index: 50;
}
#status-splash { max-height: 100%; max-width: 100%; margin: auto; }
#status-progress { display: none; position: absolute; bottom: 10%; width: 50%; margin: 0 auto; left: 25%; }
#status-notice {
	display: none; background-color: #5b3943; border-radius: 0.5rem;
	border: 1px solid #9b3943; color: #e0e0e0;
	font-family: 'Noto Sans', Arial, sans-serif; line-height: 1.3;
	margin: 0 2rem; overflow: hidden; padding: 1rem; text-align: center; z-index: 1;
}
		</style>
		<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
		<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>
	</head>
	<body>
		<!-- Click-to-start (REQUIRED for browser audio) -->
		<div id="start-overlay">
			<img src="../assets/mbc-logo.jpg" alt="MBC" class="start-logo" onerror="this.style.display='none'">
			<div class="play-btn">▶ PLAY</div>
			<div class="start-hint">Click to start (enables sound)</div>
			<div class="start-hint">Press F11 for fullscreen</div>
		</div>

		<!-- Game canvas -->
		<div id="canvas-wrapper">
			<canvas id="canvas">Your browser does not support the canvas tag.</canvas>
			<div id="status">
				<img id="status-splash" class="show-image--true fullsize--true use-filter--true" src="index.png" alt="">
				<progress id="status-progress"></progress>
				<div id="status-notice"></div>
			</div>
		</div>

		<noscript>Your browser does not support JavaScript.</noscript>
		<script src="index.js"></script>
		<script>
// ─── Canvas sizing — 16:9 ratio, high-res, centered on black bg ────
function resizeCanvas() {
	const canvas = document.getElementById('canvas');
	const ww = window.innerWidth;
	const wh = window.innerHeight;
	const dpr = window.devicePixelRatio || 1;
	const gameRatio = 1280 / 720;
	const windowRatio = ww / wh;

	let cssW, cssH;
	if (windowRatio > gameRatio) {
		cssH = wh; cssW = wh * gameRatio;
	} else {
		cssW = ww; cssH = ww / gameRatio;
	}

	// CSS size (display size)
	canvas.style.width = cssW + 'px';
	canvas.style.height = cssH + 'px';

	// Actual pixel buffer — multiply by devicePixelRatio for sharp rendering
	canvas.width = Math.round(cssW * dpr);
	canvas.height = Math.round(cssH * dpr);
}

window.addEventListener('resize', resizeCanvas);
document.addEventListener('fullscreenchange', () => setTimeout(resizeCanvas, 100));
document.addEventListener('keydown', (e) => {
	if (e.key === 'F11') {
		e.preventDefault();
		if (!document.fullscreenElement) document.documentElement.requestFullscreen();
		else document.exitFullscreen();
	}
});

// ─── Click-to-start: starts Godot engine DIRECTLY in user gesture ────
document.getElementById('start-overlay').addEventListener('click', function startGame() {
	// Remove listener so it only fires once
	document.getElementById('start-overlay').removeEventListener('click', startGame);

	// Hide overlay, show game
	document.getElementById('start-overlay').style.display = 'none';
	document.getElementById('canvas-wrapper').style.display = 'block';
	resizeCanvas();

	// Start Godot engine — MUST happen in click handler for audio to work
	const GODOT_CONFIG = {
		"args": [],
		"canvasResizePolicy": 0,
		"emscriptenPoolSize": 8,
		"ensureCrossOriginIsolationHeaders": false,
		"executable": "index",
		"experimentalVK": false,
		"fileSizes": {"index.pck":75157396, "index.wasm":37686550},
		"focusCanvas": true,
		"gdextensionLibs": [],
		"godotPoolSize": 4
	};
	const GODOT_THREADS_ENABLED = false;
	const engine = new Engine(GODOT_CONFIG);

	const statusOverlay = document.getElementById('status');
	const statusProgress = document.getElementById('status-progress');
	const statusNotice = document.getElementById('status-notice');
	let initializing = true;
	let statusMode = '';

	function setStatusMode(mode) {
		if (statusMode === mode || !initializing) return;
		if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
		statusOverlay.style.visibility = 'visible';
		statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
		statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
		statusMode = mode;
	}

	function displayFailureNotice(err) {
		console.error(err);
		if (err instanceof Error) setStatusNotice(err.message);
		else if (typeof err === 'string') setStatusNotice(err);
		else setStatusNotice('An unknown error occurred.');
		setStatusMode('notice');
		initializing = false;
	}

	function setStatusNotice(text) {
		while (statusNotice.lastChild) statusNotice.removeChild(statusNotice.lastChild);
		text.split('\n').forEach((line) => {
			statusNotice.appendChild(document.createTextNode(line));
			statusNotice.appendChild(document.createElement('br'));
		});
	}

	const missing = Engine.getMissingFeatures({ threads: GODOT_THREADS_ENABLED });
	if (missing.length !== 0) {
		displayFailureNotice('Missing features:\n' + missing.join('\n'));
	} else {
		setStatusMode('progress');
		engine.startGame({
			'onProgress': function(current, total) {
				if (current > 0 && total > 0) { statusProgress.value = current; statusProgress.max = total; }
				else { statusProgress.removeAttribute('value'); statusProgress.removeAttribute('max'); }
			},
		}).then(() => {
			setStatusMode('hidden');
			document.getElementById('canvas').focus();
		}, displayFailureNotice);
	}
});
		</script>
	</body>
</html>
