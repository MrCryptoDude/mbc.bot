<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>Play Tree Defence — MEME•BACKED•CURRENCY</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060610;--bg2:#0c0c1a;
  --gold:#e8a912;--gold-bright:#ffd04a;--gold-dim:#a07208;
  --red:#e83a3a;--green:#2ade6a;--white:#eee8e0;
  --text:#c8c4bc;--text-dim:#787470;
  --font-display:'Chakra Petch',sans-serif;
  --font-meme:'Bangers',cursive;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:#000;color:var(--text);font-family:var(--font-body);font-size:17px;touch-action:none}

#verify-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:var(--bg)}
.card{background:var(--bg2);border:1px solid rgba(232,169,18,0.15);border-radius:20px;padding:48px;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-logo{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 40px rgba(232,169,18,0.3);margin-bottom:20px}
.card h1{font-family:var(--font-meme);font-size:32px;color:var(--white);margin-bottom:6px;letter-spacing:2px}
.card .subtitle{color:var(--text-dim);font-size:16px;margin-bottom:32px}
.wallet-buttons{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.wallet-btn{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 24px;border-radius:10px;font-family:var(--font-meme);font-size:18px;letter-spacing:1px;cursor:pointer;border:2px solid rgba(232,169,18,0.2);background:rgba(232,169,18,0.05);color:var(--gold);transition:all 0.2s}
.wallet-btn:hover{border-color:var(--gold);background:rgba(232,169,18,0.12);transform:translateY(-2px)}
.wallet-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.wallet-btn .icon{font-size:22px}
.status{margin-top:20px;padding:16px;border-radius:10px;font-size:15px;display:none}
.status.show{display:block}
.status.loading{background:rgba(232,169,18,0.08);border:1px solid rgba(232,169,18,0.2);color:var(--gold)}
.status.success{background:rgba(42,222,106,0.08);border:1px solid rgba(42,222,106,0.3);color:var(--green)}
.status.error{background:rgba(232,58,58,0.08);border:1px solid rgba(232,58,58,0.3);color:var(--red)}
.status .big{font-family:var(--font-meme);font-size:24px;display:block;margin-bottom:4px;letter-spacing:1px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.requirement{margin-top:20px;padding:12px;background:rgba(232,169,18,0.04);border-left:3px solid var(--gold-dim);border-radius:0 6px 6px 0;font-family:var(--font-mono);font-size:13px;color:var(--text-dim);text-align:left}
.requirement a{color:var(--gold)}
.back-link{display:inline-block;margin-top:20px;color:var(--text-dim);text-decoration:none;font-size:14px;transition:color 0.2s}
.back-link:hover{color:var(--gold)}

#start-screen{display:none;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:24px;cursor:pointer;user-select:none;background:var(--bg)}
#start-screen:hover .start-btn{background:var(--gold-bright);box-shadow:0 8px 40px rgba(232,169,18,0.5);transform:scale(1.05)}
.start-btn{font-family:var(--font-meme);font-size:36px;color:var(--bg);background:var(--gold);padding:20px 60px;border-radius:16px;letter-spacing:4px;box-shadow:0 4px 30px rgba(232,169,18,0.3);transition:all 0.3s}
.start-hint{font-family:var(--font-mono);font-size:13px;color:var(--text-dim);letter-spacing:1px}
.loading-text{font-family:var(--font-meme);font-size:20px;color:var(--gold);letter-spacing:2px;display:none}

#game-wrapper{display:none;width:100vw;height:100vh;background:#000;position:relative;overflow:hidden}
#canvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#canvas:focus{outline:none}

#status-godot{position:absolute;left:0;right:0;top:0;bottom:0;background-color:#242424;display:flex;flex-direction:column;justify-content:center;align-items:center;visibility:hidden;z-index:10}
#status-splash{max-height:100%;max-width:100%;margin:auto}
#status-progress{display:none;position:absolute;bottom:10%;width:50%;margin:0 auto;left:25%}
#status-notice{display:none;background-color:#5b3943;border-radius:0.5rem;border:1px solid #9b3943;color:#e0e0e0;font-family:'Noto Sans',Arial,sans-serif;line-height:1.3;margin:0 2rem;padding:1rem;text-align:center;z-index:1}
</style>
<link id="-gd-engine-icon" rel="icon" type="image/png" href="game-web/index.icon.png" />
<!-- PRE-LOAD Godot engine script so it's ready when user clicks Play -->
<script src="game-web/index.js"></script>
</head>
<body>

<!-- STEP 1: WALLET VERIFICATION -->
<div id="verify-screen">
  <div class="card">
    <img src="assets/mbc-logo.jpg" alt="MBC" class="card-logo">
    <h1>Tree Defence</h1>
    <p class="subtitle">Connect your wallet to verify 1,000 MBC and play in your browser</p>
    <div class="wallet-buttons">
      <button class="wallet-btn" id="btn-unisat" onclick="connectUnisat()">
        <span class="icon">🟧</span> Connect Unisat
      </button>
      <button class="wallet-btn" id="btn-xverse" onclick="connectXverse()">
        <span class="icon">🟦</span> Connect Xverse
      </button>
      <button class="wallet-btn" id="btn-leather" onclick="connectLeather()">
        <span class="icon">🟫</span> Connect Leather
      </button>
    </div>
    <div class="requirement">
      🔒 Requires 1,000 MBC. Buy on <a href="https://www.satflow.com/runes/MEME%E2%80%A2BACKED%E2%80%A2CURRENCY" target="_blank">Satflow</a>
    </div>
    <div class="status" id="status-verify"></div>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
</div>

<!-- STEP 2: CLICK TO START -->
<div id="start-screen">
  <img src="assets/mbc-logo.jpg" alt="MBC" style="width:120px;height:120px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 60px rgba(232,169,18,0.4)">
  <div class="start-btn" id="playBtn">▶ PLAY</div>
  <div class="start-hint">Click to start (enables sound)</div>
  <div class="start-hint" style="margin-top:4px">Press F11 for fullscreen</div>
  <div class="loading-text" id="loadingText">Loading game...</div>
</div>

<!-- STEP 3: GAME -->
<div id="game-wrapper">
  <canvas id="canvas">Your browser does not support the canvas tag.</canvas>
  <div id="status-godot">
    <img id="status-splash" src="game-web/index.png" alt="">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

function showStatus(type, html) {
  const el = document.getElementById('status-verify');
  el.className = 'status show ' + type;
  el.innerHTML = html;
}

// ─── Wallet connections ─────────────────────────────────
async function connectUnisat() {
  if (typeof window.unisat === 'undefined') {
    showStatus('error', "Unisat not detected. Install from <a href='https://unisat.io' target='_blank' style='color:var(--gold)'>unisat.io</a>");
    return;
  }
  showStatus('loading', "<span class='spinner'></span> Connecting to Unisat...");
  try {
    const accounts = await window.unisat.requestAccounts();
    if (accounts && accounts.length > 0) await verifyAddress(accounts[0]);
  } catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function connectXverse() {
  if (typeof window.XverseProviders === 'undefined' && typeof window.satsConnect === 'undefined') {
    showStatus('error', "Xverse not detected. Install from <a href='https://www.xverse.app' target='_blank' style='color:var(--gold)'>xverse.app</a>");
    return;
  }
  showStatus('loading', "<span class='spinner'></span> Connecting to Xverse...");
  try {
    const provider = window.XverseProviders?.BitcoinProvider || window.BitcoinProvider;
    if (provider) {
      const response = await provider.request('getAccounts', { purposes: ['ordinals', 'payment'] });
      if (response.result && response.result.length > 0) {
        const ordAddr = response.result.find(a => a.purpose === 'ordinals');
        await verifyAddress(ordAddr ? ordAddr.address : response.result[0].address);
      }
    }
  } catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function connectLeather() {
  if (typeof window.LeatherProvider === 'undefined' && typeof window.btc === 'undefined') {
    showStatus('error', "Leather not detected. Install from <a href='https://leather.io' target='_blank' style='color:var(--gold)'>leather.io</a>");
    return;
  }
  showStatus('loading', "<span class='spinner'></span> Connecting to Leather...");
  try {
    const provider = window.LeatherProvider || window.btc;
    const response = await provider.request('getAddresses');
    if (response.result && response.result.addresses) {
      const taproot = response.result.addresses.find(a => a.type === 'p2tr');
      await verifyAddress(taproot ? taproot.address : response.result.addresses[0].address);
    }
  } catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function verifyAddress(address) {
  showStatus('loading', `<span class='spinner'></span> Checking MBC balance for ${address.slice(0,8)}...${address.slice(-6)}`);
  try {
    const startRes = await fetch(`${API_BASE}/api/verify?action=start`, {
      method: 'POST', headers: {'Content-Type': 'application/json'}
    });
    const startData = await startRes.json();
    const res = await fetch(`${API_BASE}/api/verify?action=complete`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ sessionId: startData.sessionId, address }),
    });
    const data = await res.json();
    if (data.verified) {
      showStatus('success', `<span class='big'>✓ Verified!</span>${data.balance.toLocaleString()} MBC`);
      document.querySelectorAll('.wallet-btn').forEach(b => b.disabled = true);
      setTimeout(() => {
        document.getElementById('verify-screen').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
      }, 1200);
    } else {
      showStatus('error',
        `<span class='big'>✗ Insufficient Balance</span>
         Found ${data.balance.toLocaleString()} MBC — need ${data.required.toLocaleString()}<br>
         <a href="https://www.satflow.com/runes/MEME%E2%80%A2BACKED%E2%80%A2CURRENCY" target="_blank" style="color:var(--gold)">Buy MBC on Satflow</a>`);
    }
  } catch (err) { showStatus('error', 'Server error: ' + (err.message || err)); }
}

// ─── CLICK TO START — engine.startGame() called DIRECTLY in click handler ───
document.getElementById('start-screen').addEventListener('click', function startGameOnClick() {
  // Remove this listener so it only fires once
  document.getElementById('start-screen').removeEventListener('click', startGameOnClick);
  
  // Update UI
  document.getElementById('playBtn').style.display = 'none';
  document.querySelector('.start-hint').style.display = 'none';
  document.getElementById('loadingText').style.display = 'block';

  // Show game canvas
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-wrapper').style.display = 'block';
  resizeCanvas();

  // Create and start the Godot engine DIRECTLY inside user click handler
  // This is critical for browser audio — AudioContext must be created during a user gesture
  const GODOT_CONFIG = {
    "args": [],
    "canvasResizePolicy": 0,
    "emscriptenPoolSize": 8,
    "ensureCrossOriginIsolationHeaders": false,
    "executable": "game-web/index",
    "experimentalVK": false,
    "fileSizes": {"game-web/index.pck":75157396, "game-web/index.wasm":37686550},
    "focusCanvas": true,
    "gdextensionLibs": [],
    "godotPoolSize": 4
  };

  const engine = new Engine(GODOT_CONFIG);

  const statusOverlay = document.getElementById('status-godot');
  const statusProgress = document.getElementById('status-progress');
  const statusNotice = document.getElementById('status-notice');
  let initializing = true;
  let statusMode = '';

  function setStatusMode(mode) {
    if (statusMode === mode || !initializing) return;
    if (mode === 'hidden') { statusOverlay.remove(); initializing = false; return; }
    statusOverlay.style.visibility = 'visible';
    statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
    statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
    statusMode = mode;
  }

  function displayFailureNotice(err) {
    console.error(err);
    const msg = err instanceof Error ? err.message : typeof err === 'string' ? err : 'An unknown error occurred.';
    statusNotice.textContent = msg;
    statusNotice.style.display = 'block';
    setStatusMode('notice');
    initializing = false;
  }

  setStatusMode('progress');
  engine.startGame({
    'onProgress': function(current, total) {
      if (current > 0 && total > 0) {
        statusProgress.value = current;
        statusProgress.max = total;
      } else {
        statusProgress.removeAttribute('value');
        statusProgress.removeAttribute('max');
      }
    },
  }).then(() => {
    setStatusMode('hidden');
    document.getElementById('canvas').focus();
    // Resume all AudioContexts that might exist
    if (typeof GodotRuntime !== 'undefined' && GodotRuntime.audio_context) {
      GodotRuntime.audio_context.resume();
    }
    // Also try the global GodotAudio approach
    try {
      const allContexts = [...document.querySelectorAll('*')].reduce((acc, el) => acc, []);
      // Find any suspended AudioContext
      if (window.GodotAudio && window.GodotAudio.ctx) {
        window.GodotAudio.ctx.resume();
        console.log('Resumed GodotAudio.ctx');
      }
    } catch(e) { console.log('Audio resume attempt:', e); }
  }, displayFailureNotice);
});

// ─── Canvas sizing — 16:9 ratio, centered ───────────────
function resizeCanvas() {
  const canvas = document.getElementById('canvas');
  const ww = window.innerWidth;
  const wh = window.innerHeight;
  const gameRatio = 1280 / 720;
  const windowRatio = ww / wh;
  let cw, ch;
  if (windowRatio > gameRatio) {
    ch = wh; cw = wh * gameRatio;
  } else {
    cw = ww; ch = ww / gameRatio;
  }
  canvas.style.width = cw + 'px';
  canvas.style.height = ch + 'px';
  canvas.width = 1280;
  canvas.height = 720;
}
window.addEventListener('resize', () => {
  if (document.getElementById('game-wrapper').style.display === 'block') resizeCanvas();
});
document.addEventListener('fullscreenchange', () => setTimeout(resizeCanvas, 100));
document.addEventListener('keydown', (e) => {
  if (e.key === 'F11') {
    e.preventDefault();
    if (!document.fullscreenElement) document.documentElement.requestFullscreen();
    else document.exitFullscreen();
  }
});
</script>
</body>
</html>
