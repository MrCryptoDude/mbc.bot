<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
<title>Play Tree Defence — MEME•BACKED•CURRENCY</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Chakra+Petch:wght@400;600;700&family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060610;--bg2:#0c0c1a;
  --gold:#e8a912;--gold-bright:#ffd04a;--gold-dim:#a07208;
  --red:#e83a3a;--green:#2ade6a;--white:#eee8e0;
  --text:#c8c4bc;--text-dim:#787470;
  --font-display:'Chakra Petch',sans-serif;
  --font-meme:'Bangers',cursive;
  --font-body:'Rajdhani',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:17px}

#verify-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:var(--bg2);border:1px solid rgba(232,169,18,0.15);border-radius:20px;padding:48px;max-width:480px;width:100%;text-align:center;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.card-logo{width:100px;height:100px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 40px rgba(232,169,18,0.3);margin-bottom:20px}
.card h1{font-family:var(--font-meme);font-size:32px;color:var(--white);margin-bottom:6px;letter-spacing:2px}
.card .subtitle{color:var(--text-dim);font-size:16px;margin-bottom:32px}
.wallet-buttons{display:flex;flex-direction:column;gap:12px;margin-bottom:20px}
.wallet-btn{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px 24px;border-radius:10px;font-family:var(--font-meme);font-size:18px;letter-spacing:1px;cursor:pointer;border:2px solid rgba(232,169,18,0.2);background:rgba(232,169,18,0.05);color:var(--gold);transition:all 0.2s}
.wallet-btn:hover{border-color:var(--gold);background:rgba(232,169,18,0.12);transform:translateY(-2px)}
.wallet-btn:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.wallet-btn .icon{font-size:22px}
.status{margin-top:20px;padding:16px;border-radius:10px;font-size:15px;display:none}
.status.show{display:block}
.status.loading{background:rgba(232,169,18,0.08);border:1px solid rgba(232,169,18,0.2);color:var(--gold)}
.status.success{background:rgba(42,222,106,0.08);border:1px solid rgba(42,222,106,0.3);color:var(--green)}
.status.error{background:rgba(232,58,58,0.08);border:1px solid rgba(232,58,58,0.3);color:var(--red)}
.status .big{font-family:var(--font-meme);font-size:24px;display:block;margin-bottom:4px;letter-spacing:1px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--gold-dim);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.requirement{margin-top:20px;padding:12px;background:rgba(232,169,18,0.04);border-left:3px solid var(--gold-dim);border-radius:0 6px 6px 0;font-family:var(--font-mono);font-size:13px;color:var(--text-dim);text-align:left}
.requirement a{color:var(--gold)}
.back-link{display:inline-block;margin-top:20px;color:var(--text-dim);text-decoration:none;font-size:14px;transition:color 0.2s}
.back-link:hover{color:var(--gold)}
</style>
</head>
<body>

<div id="verify-screen">
  <div class="card">
    <img src="assets/mbc-logo.jpg" alt="MBC" class="card-logo">
    <h1>Tree Defence</h1>
    <p class="subtitle">Connect your wallet to verify 1,000 MBC and play in your browser</p>
    <div class="wallet-buttons">
      <button class="wallet-btn" onclick="connectUnisat()">
        <span class="icon">🟧</span> Connect Unisat
      </button>
      <button class="wallet-btn" onclick="connectXverse()">
        <span class="icon">🟦</span> Connect Xverse
      </button>
      <button class="wallet-btn" onclick="connectLeather()">
        <span class="icon">🟫</span> Connect Leather
      </button>
    </div>
    <div class="requirement">
      🔒 Requires 1,000 MBC. Buy on <a href="https://www.satflow.com/runes/MEME%E2%80%A2BACKED%E2%80%A2CURRENCY" target="_blank">Satflow</a>
    </div>
    <div class="status" id="status-verify"></div>
    <a href="index.html" class="back-link">← Back to Home</a>
  </div>
</div>

<script>
const API_BASE = window.location.origin;

function showStatus(type, html) {
  const el = document.getElementById('status-verify');
  el.className = 'status show ' + type;
  el.innerHTML = html;
}

async function connectUnisat() {
  if (typeof window.unisat === 'undefined') { showStatus('error', "Unisat not detected. Install from <a href='https://unisat.io' target='_blank' style='color:var(--gold)'>unisat.io</a>"); return; }
  showStatus('loading', "<span class='spinner'></span> Connecting to Unisat...");
  try { const a = await window.unisat.requestAccounts(); if (a && a.length > 0) await verifyAddress(a[0]); }
  catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function connectXverse() {
  if (typeof window.XverseProviders === 'undefined' && typeof window.satsConnect === 'undefined') { showStatus('error', "Xverse not detected. Install from <a href='https://www.xverse.app' target='_blank' style='color:var(--gold)'>xverse.app</a>"); return; }
  showStatus('loading', "<span class='spinner'></span> Connecting to Xverse...");
  try {
    const provider = window.XverseProviders?.BitcoinProvider || window.BitcoinProvider;
    if (provider) { const r = await provider.request('getAccounts', { purposes: ['ordinals','payment'] }); if (r.result && r.result.length > 0) { const o = r.result.find(a => a.purpose === 'ordinals'); await verifyAddress(o ? o.address : r.result[0].address); } }
  } catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function connectLeather() {
  if (typeof window.LeatherProvider === 'undefined' && typeof window.btc === 'undefined') { showStatus('error', "Leather not detected. Install from <a href='https://leather.io' target='_blank' style='color:var(--gold)'>leather.io</a>"); return; }
  showStatus('loading', "<span class='spinner'></span> Connecting to Leather...");
  try {
    const provider = window.LeatherProvider || window.btc;
    const r = await provider.request('getAddresses');
    if (r.result && r.result.addresses) { const t = r.result.addresses.find(a => a.type === 'p2tr'); await verifyAddress(t ? t.address : r.result.addresses[0].address); }
  } catch (err) { showStatus('error', 'Rejected: ' + (err.message || err)); }
}

async function verifyAddress(address) {
  showStatus('loading', `<span class='spinner'></span> Checking MBC balance for ${address.slice(0,8)}...${address.slice(-6)}`);
  try {
    const startRes = await fetch(`${API_BASE}/api/verify?action=start`, { method: 'POST', headers: {'Content-Type': 'application/json'} });
    const startData = await startRes.json();
    const res = await fetch(`${API_BASE}/api/verify?action=complete`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ sessionId: startData.sessionId, address }) });
    const data = await res.json();
    if (data.verified) {
      showStatus('success', `<span class='big'>✓ Verified!</span>${data.balance.toLocaleString()} MBC — Launching game...`);
      document.querySelectorAll('.wallet-btn').forEach(b => b.disabled = true);
      // Redirect to the actual Godot game page after a moment
      setTimeout(() => { window.location.href = 'game-web/index.html'; }, 1500);
    } else {
      showStatus('error', `<span class='big'>✗ Insufficient Balance</span>Found ${data.balance.toLocaleString()} MBC — need ${data.required.toLocaleString()}<br><a href="https://www.satflow.com/runes/MEME%E2%80%A2BACKED%E2%80%A2CURRENCY" target="_blank" style="color:var(--gold)">Buy MBC on Satflow</a>`);
    }
  } catch (err) { showStatus('error', 'Server error: ' + (err.message || err)); }
}
</script>
</body>
</html>
